<!DOCTYPE html>

<html lang="cs">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', path='toast.css') }}">
        <title>HireTrackr - AI Powered Job Application Tracker</title>
    </head>

    <body>
        <nav class="navbar">
            <a href="/" class="nav-brand">HireTrackr</a>
            <ul class="nav-links">
                <li><a href="/prehled" class="{% if request.url.path == '/prehled' %}active{% endif %}">Přehled</a></li>
                <li><a href="/zadosti" class="{% if request.url.path.startswith('/zadosti') %}active{% endif %}">Žádosti</a></li>
                <li><a href="/cv_dilna" class="{% if request.url.path == '/cv_dilna' %}active{% endif %}">CV Dílna</a></li>
                <li><a href="/motivacni_dopis" class="{% if request.url.path == '/motivacni_dopis' %}active{% endif %}">Motivacni dopis</a></li>
                <li><a href="/konverze_na_pdf" class="{% if request.url.path == '/konverze_na_pdf' %}active{% endif %}">Konverze na PDF</a></li>
            </ul>

            <div class="nav-auth">
                {% if request.session.get("user_id") %}
                    <span class="nav-user">Přihlášený: {{ request.session.get("full_name")|title }}</span>
                    <form method="post" action="/logout">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <button type="submit">Odhlásit se</button>
                    </form>
                {% else %}
                    <a href="/login" class="{% if request.url.path == '/login' %}active{% endif %}">Přihlášení</a>
                    <a href="/register" class="{% if request.url.path == '/register' %}active{% endif %}">Registrace</a>
                {% endif %}
            </div>
        </nav>

        <main>
            {% block content %}{% endblock %}
        </main>

        <script src="{{ url_for('static', path='js/toast.js') }}"></script>
        {% block scripts %}{% endblock %}

    </body>
</html>
