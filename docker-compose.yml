services:
  api:
    build: .
    container_name: job-application-ai
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      # App / DB
        - DATABASE_URL=postgresql://postgres:postgres@db:5432/job_app_db
        - SECRET_KEY=${SECRET_KEY}
        - APP_BASE_URL=${APP_BASE_URL}
        
        # Email verification tokens
        - EMAIL_SECRET=${EMAIL_SECRET}

        # SMTP (Resend / provider)
        - EMAIL_FROM=${EMAIL_FROM}
        - SMTP_HOST=${SMTP_HOST}
        - SMTP_PORT=${SMTP_PORT}
        - SMTP_USER=${SMTP_USER}
        - SMTP_PASS=${SMTP_PASS}

        # Cloudflare R2 storage
        - R2_ENDPOINT=${R2_ENDPOINT}
        - R2_BUCKET=${R2_BUCKET}
        - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
        - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
        - R2_REGION=${R2_REGION}
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: job-application-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: job-application-ai-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data: